name: khatir
description: khatir

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=2.18.2 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  share_plus: ^11.0.0
  url_launcher: ^6.1.10
  flutter_launcher_icons: ^0.14.2 # change icons
  flutter_bloc: ^9.0.0
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  #uses-material-design: true

flutter:
  
  uses-material-design: true

  assets:
   #- assets/images/onboarding_one.PNG
   - assets/images/91k.jpg
   - assets/images/athkari5.jpg
   #- assets/sounds/click-1.mp3

  fonts:
     - family: Amiri
       fonts:
         - asset: assets/fonts/Amiri/Amiri-Regular.ttf
         - asset: assets/fonts/Amiri/Amiri-Bold.ttf
           weight: 700

     - family: Cairo
       fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700

          
